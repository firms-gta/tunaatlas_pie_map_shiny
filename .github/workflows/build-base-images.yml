name: Build base Docker images

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/no-ref/dockercleaning
    paths:
      - "docker/Dockerfile"
      - "docker/Dockerfile.data"
      - "renv.lock"
      - "renv/**"
      - "update_data.R"
      - "DOI.csv"
      - ".github/workflows/build-base-images.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-app
  DATA_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-data

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:dev
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=tunaatlas-app
          cache-to: type=gha,mode=max,scope=tunaatlas-app

  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push data image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.data
          push: true
          tags: |
            ${{ env.DATA_IMAGE }}:dev
            ${{ env.DATA_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=tunaatlas-data
          cache-to: type=gha,mode=max,scope=tunaatlas-data