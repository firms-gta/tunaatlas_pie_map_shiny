name: Build base Docker images

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to build"
        required: true
        default: "main"

  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-app
  DEV_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-app-dev
  DATA_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-data

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
      branch_tag: ${{ steps.branch.outputs.tag }}
      build_data: ${{ steps.changes.outputs.data }}
      build_dev: ${{ steps.changes.outputs.dev }}

    steps:
      - name: Determine branch and Docker tag
        id: branch
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ inputs.base_branch }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          BRANCH_TAG=$(echo "$BRANCH_NAME" \
            | sed 's/[^a-zA-Z0-9_.-]/_/g' \
            | tr '[:upper:]' '[:lower:]')

          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

          echo "Branch: $BRANCH_NAME"
          echo "Docker tag: $BRANCH_TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      - name: Detect image-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            data:
              - "DOI.csv"
              - "docker/Dockerfile.data"
              - "download_GTA_data.R"
              - "update_data.R"
              - ".github/workflows/build-base-images.yml"

            dev:
              - "docker/Dockerfile"
              - "renv.lock"
              - "renv/**"
              - "R/**"
              - "global/**"
              - "modules/**"
              - "tab_panels/**"
              - "www/**"
              - "server.R"
              - "ui.R"
              - "global.R"
              - "entrypoint.sh"
              - ".github/workflows/build-base-images.yml"

  build-app:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 140

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true

          build-args: |
            MODE=prod
            BASE_IMAGE=rocker/r-ver:4.2.3
            BRANCH=${{ needs.prepare.outputs.branch_name }}

          tags: |
            ${{ env.APP_IMAGE }}:${{ needs.prepare.outputs.branch_tag }}
            ${{ env.APP_IMAGE }}:${{ github.sha }}

          cache-from: |
            type=gha,scope=tunaatlas-app-${{ needs.prepare.outputs.branch_tag }}

          cache-to: |
            type=gha,mode=max,scope=tunaatlas-app-${{ needs.prepare.outputs.branch_tag }}

  build-data:
    needs: prepare

    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.prepare.outputs.build_data == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 140

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push data image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.data
          push: true

          tags: |
            ${{ env.DATA_IMAGE }}:${{ needs.prepare.outputs.branch_tag }}
            ${{ env.DATA_IMAGE }}:${{ github.sha }}

          cache-from: |
            type=gha,scope=tunaatlas-data-${{ needs.prepare.outputs.branch_tag }}

          cache-to: |
            type=gha,mode=max,scope=tunaatlas-data-${{ needs.prepare.outputs.branch_tag }}

  build-dev:
    needs:
      - prepare
      - build-app

    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.prepare.outputs.build_dev == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 140

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true

          build-args: |
            MODE=dev
            BASE_IMAGE=rocker/rstudio:4.2.3
            BRANCH=${{ needs.prepare.outputs.branch_name }}

          tags: |
            ${{ env.DEV_IMAGE }}:${{ needs.prepare.outputs.branch_tag }}
            ${{ env.DEV_IMAGE }}:${{ github.sha }}

          cache-from: |
            type=gha,scope=tunaatlas-app-dev-${{ needs.prepare.outputs.branch_tag }}

          cache-to: |
            type=gha,mode=max,scope=tunaatlas-app-dev-${{ needs.prepare.outputs.branch_tag }}