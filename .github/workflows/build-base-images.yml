name: Build base Docker images

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to build"
        required: true
        default: "main"

  push:
    branches:
      - main
    paths:
      - "docker/Dockerfile"
      - "docker/Dockerfile.data"
      - "renv.lock"
      - "renv/**"
      - "update_data.R"
      - "DOI.csv"
      - ".github/workflows/build-base-images.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-app
  DATA_IMAGE: ghcr.io/${{ github.repository_owner }}/tunaatlas-data

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      branch_name: ${{ steps.branch.outputs.name }}
      branch_tag: ${{ steps.branch.outputs.tag }}

    steps:
      - name: Determine branch and Docker tag
        id: branch
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ inputs.base_branch }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          BRANCH_TAG=$(echo "$BRANCH_NAME" \
            | sed 's/[^a-zA-Z0-9_.-]/_/g' \
            | tr '[:upper:]' '[:lower:]')

          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

          echo "Branch: $BRANCH_NAME"
          echo "Docker tag: $BRANCH_TAG"

  build-app:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ needs.prepare.outputs.branch_tag }}
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=tunaatlas-app-${{ needs.prepare.outputs.branch_tag }}
          cache-to: type=gha,mode=max,scope=tunaatlas-app-${{ needs.prepare.outputs.branch_tag }}

  build-data:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push data image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.data
          push: true
          tags: |
            ${{ env.DATA_IMAGE }}:${{ needs.prepare.outputs.branch_tag }}
            ${{ env.DATA_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=tunaatlas-data-${{ needs.prepare.outputs.branch_tag }}
          cache-to: type=gha,mode=max,scope=tunaatlas-data-${{ needs.prepare.outputs.branch_tag }}